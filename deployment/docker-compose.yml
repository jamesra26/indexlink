name: indexlink-local

services:
  server:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      RUST_LOG: ${RUST_LOG:-info,indexlink_server=debug}
      DATABASE_URL: sqlite:///data/indexlink.db?mode=rwc
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      DATABASE_MAX_CONNECTIONS: ${DATABASE_MAX_CONNECTIONS:-10}
      DATABASE_CONNECT_TIMEOUT_SECONDS: ${DATABASE_CONNECT_TIMEOUT_SECONDS:-5}
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/ready"]
      interval: 10s
      timeout: 3s
      retries: 5
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - sqlite-data:/data

volumes:
  sqlite-data:
